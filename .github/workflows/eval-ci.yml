name: eval-ci

# Runs the held-out eval suite (baseline vs candidate) and posts a sticky
# comment with per-probe scores and a tiered verdict.
#
# LABEL-GATED: the LLM eval only runs when the `run-eval` label is present
# on the PR, or on workflow_dispatch.  Adding the label = owner approval for
# a full eval run.  Removing the label stops auto-runs.  Cheap deterministic
# checks (eval.yml) are always unconditional and are NOT affected by this.
#
# paths filter includes eval/** so a labeled probe-only PR re-runs eval with
# the new measuring instrument applied to both calibrations.
#
# This workflow is ADDITIVE — it does not modify eval.yml (probe validation).
#
# Parallelism: ci_eval.py run spawns one thread per eval cell (full fan-out).
# Override with EVAL_MAX_WORKERS env var for emergency throttling.
# Prompt caching: calibration (60 KB) is passed as --system-prompt so the
# Anthropic API caches it after the first warm-up call; subsequent parallel
# calls pay only the small probe-text token cost.
# Verified: 2026-06-11 — cache_read_input_tokens confirmed in CLI JSON output.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'CLAUDE.md'
      - 'invariants.txt'
      - 'agents/**'
      - 'hooks/**'
      - 'eval/**'
  workflow_dispatch:
    inputs:
      smoke:
        description: 'Smoke run — questions-only, k=1 (cheap live validation)'
        type: boolean
        default: false

# Cancel in-progress runs for the same PR branch when a new push arrives.
concurrency:
  group: eval-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Guard: secrets are unavailable on fork PRs. Check before spending tokens.
  # ---------------------------------------------------------------------------
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.probe.outputs.has-token }}
    steps:
      - name: Probe for CLAUDE_CODE_OAUTH_TOKEN
        id: probe
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # Non-empty env var → token present. Empty → fork or secret not set.
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-token=false" >> "$GITHUB_OUTPUT"
            echo "CLAUDE_CODE_OAUTH_TOKEN is absent — skipping LLM eval (fork PR or secret not configured)."
          fi

  eval:
    needs: check-secrets
    # Human gate: the eval-approval environment requires a reviewer click in the
    # web UI before this job starts. Labels and dispatches only REQUEST a run;
    # an owner-credentialed agent can add the label but cannot click Approve.
    environment: eval-approval
    # Token must be present AND either: manual dispatch, or PR carries run-eval label.
    # The label check is an expressions-layer contains() — never interpolated into shell.
    if: |
      needs.check-secrets.outputs.has-token == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'run-eval')
      )
    runs-on: ubuntu-latest

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # generation model: cheapest current haiku (owner decision)
      GEN_MODEL: claude-haiku-4-5
      # judge model: haiku-4-5 (L2 lever — cheaper, same family; bias note updated in ci_eval.py)
      JUDGE_MODEL: claude-haiku-4-5

    steps:
      # -----------------------------------------------------------------------
      # Checkout — full history required: run_suite.py uses git show on
      # merge-base SHA to materialise the baseline calibration content.
      # -----------------------------------------------------------------------
      - name: Checkout (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Canary GUID masking — must run before any LLM calls or log output
      # so GUIDs never appear in Actions logs even if a response leaks one.
      # -----------------------------------------------------------------------
      - name: Mask canary GUIDs in Actions logs
        run: |
          set -euo pipefail
          guids=$(grep -hoE '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' \
            eval/questions/q*.md eval/adversarial/adv*.md 2>/dev/null | sort -u || true)
          for g in $guids; do
            echo "::add-mask::$g"
          done
          echo "Masked $(echo "$guids" | grep -c . || echo 0) canary GUID(s)."

      # -----------------------------------------------------------------------
      # Resolve SHAs — candidate = PR head; baseline = merge-base with main.
      # Values go into step outputs; never interpolated directly into shell.
      # -----------------------------------------------------------------------
      - name: Resolve merge-base and candidate SHAs
        id: refs
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA_FALLBACK: ${{ github.sha }}
        run: |
          set -euo pipefail
          CANDIDATE_SHA="${PR_HEAD_SHA:-$GITHUB_SHA_FALLBACK}"
          git fetch origin main --depth=0 2>/dev/null || true
          BASELINE_SHA=$(git merge-base origin/main "$CANDIDATE_SHA" || echo "")
          if [ -z "$BASELINE_SHA" ]; then
            BASELINE_SHA=$(git rev-parse "${CANDIDATE_SHA}^")
          fi
          echo "baseline=$BASELINE_SHA" >> "$GITHUB_OUTPUT"
          echo "candidate=$CANDIDATE_SHA" >> "$GITHUB_OUTPUT"
          echo "Baseline: $BASELINE_SHA"
          echo "Candidate: $CANDIDATE_SHA"

      # -----------------------------------------------------------------------
      # Cache key — calibration-content hash + probe-file hash.
      # L1: baseline key uses sha256 over the EXACT file set that
      # calibration_content() reads (run_suite.py:84-97) at BASELINE_SHA via
      # `git show`, not the merge-base SHA itself.  Docs-only merges to main
      # that do not touch CLAUDE.md / invariants.txt / agents/*.md must not
      # invalidate the cached baseline.
      # -----------------------------------------------------------------------
      - name: Compute probe-hash for cache key
        id: probe-hash
        run: |
          set -euo pipefail
          hash=$(cat eval/questions/*.md eval/adversarial/*.md 2>/dev/null \
            | sha256sum | cut -d' ' -f1)
          echo "value=$hash" >> "$GITHUB_OUTPUT"

      - name: Compute calibration-content hash for cache key
        id: calib-hash
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline }}
        run: |
          set -euo pipefail
          # B5: Use CALIB_FILES from run_suite.py as the single source of truth.
          # Sentinel "<relpath>:<bytelen>:<content>" per file so a deleted file
          # produces a different hash than an empty file (absent ≠ empty).
          hash=$(python3 - <<'PY'
          import hashlib, subprocess, sys, os
          sys.path.insert(0, os.path.join(os.path.dirname(os.path.abspath("eval/run_suite.py")), "eval"))
          from run_suite import CALIB_FILES
          sha = hashlib.sha256()
          baseline_sha = os.environ["BASELINE_SHA"]
          for relpath, _label in CALIB_FILES:
              r = subprocess.run(
                  ["git", "show", f"{baseline_sha}:{relpath}"],
                  capture_output=True,
              )
              content = r.stdout if r.returncode == 0 else b""
              sentinel = f"{relpath}:{len(content)}:".encode() + content + b"\n"
              sha.update(sentinel)
          print(sha.hexdigest())
          PY
          )
          echo "value=$hash" >> "$GITHUB_OUTPUT"
          echo "Calibration-content hash at baseline ${BASELINE_SHA}: $hash"

      # B1: Explicit restore+save split so a candidate failure never poisons
      # a valid baseline.  Restore here; save is a separate step gated on
      # baseline_ok (set by the concurrent eval step) with if: always() so
      # the save runs even when downstream steps fail.
      - name: Restore cached baseline results
        id: cache-baseline
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: baseline-cache/
          key: baseline-${{ steps.calib-hash.outputs.value }}-${{ steps.probe-hash.outputs.value }}

      # -----------------------------------------------------------------------
      # Toolchain — Node (Claude CLI) + Python
      # -----------------------------------------------------------------------
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      # L4: Cache the npm global prefix so `npm install -g @anthropic-ai/claude-code`
      # is ~free on warm runs.  Key includes node version + CLI version so a
      # CLI upgrade or node upgrade correctly invalidates.  Cache path is the
      # global prefix returned by `npm config get prefix` — on ubuntu-latest
      # this is /usr/local (packages at /usr/local/lib/node_modules, bins at
      # /usr/local/bin/<bin>).  Using the full prefix dir ensures bin symlinks
      # are also cached and the CLI is immediately on PATH after restore.
      - name: Resolve npm global prefix for cache
        id: npm-prefix
        run: echo "value=$(npm config get prefix)" >> "$GITHUB_OUTPUT"

      - name: Resolve Claude Code CLI version for cache key
        id: cli-version
        run: |
          set -euo pipefail
          ver=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
          echo "value=$ver" >> "$GITHUB_OUTPUT"

      - name: Cache npm global prefix (Claude Code CLI)
        id: cache-cli
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ steps.npm-prefix.outputs.value }}/lib/node_modules/@anthropic-ai
            ${{ steps.npm-prefix.outputs.value }}/bin/claude
          key: npm-global-claude-${{ runner.os }}-node20-${{ steps.cli-version.outputs.value }}

      - name: Install Claude Code CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: npm install -g @anthropic-ai/claude-code

      # B6: smoke-test the CLI; reinstall on stale/broken cache restore.
      - name: Verify Claude Code CLI (smoke + reinstall on failure)
        run: |
          set -euo pipefail
          if ! claude --version 2>/dev/null; then
            echo "claude --version failed — reinstalling (stale cache or missing bin)" >&2
            npm install -g @anthropic-ai/claude-code
            claude --version
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          # A6: pin 3.12 — scipy 1.15.3 has no cp314 wheel (Python 3.14 runner
          # tried a source build → OpenBLAS not found → exit 1, live run evidence:
          # /tmp/eval46-fail2.log).  cp312 wheel exists; pin to 3.12 to avoid
          # silent regressions on future '3.x' → 3.15+ upgrades.
          python-version: '3.12'

      - name: Install Python dependencies
        # scipy is required for the Wilcoxon signed-rank test in statistical_test.py.
        # Pin to avoid silent breakage; numpy is bundled with scipy.
        run: pip install scipy==1.15.3

      # -----------------------------------------------------------------------
      # Determine k (runs per probe) — smoke mode uses k=1, normal uses k=3.
      # -----------------------------------------------------------------------
      - name: Set k and probe list
        id: params
        env:
          SMOKE_INPUT: ${{ github.event.inputs.smoke || 'false' }}
        run: |
          smoke="$SMOKE_INPUT"
          if [ "$smoke" = "true" ]; then
            echo "k=1" >> "$GITHUB_OUTPUT"
            echo "probes=questions" >> "$GITHUB_OUTPUT"
            echo "smoke_suffix= (smoke: questions-only, k=1)" >> "$GITHUB_OUTPUT"
          else
            echo "k=3" >> "$GITHUB_OUTPUT"
            echo "probes=questions,adversarial" >> "$GITHUB_OUTPUT"
            echo "smoke_suffix=" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Eval runs — L3: when baseline is a cache MISS run baseline and
      # candidate concurrently (independent refs, dirs, system prompts) using
      # two Python threads in one step.  KISS choice: single step + threads
      # is simpler than parallel jobs and preserves cache save/restore
      # semantics (baseline-cache/ stays in the same job).  On cache HIT
      # only the candidate runs (fast path unchanged).
      # -----------------------------------------------------------------------
      - name: Run baseline + candidate eval concurrently (cache miss)
        id: concurrent-eval
        if: steps.cache-baseline.outputs.cache-hit != 'true'
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline }}
          CANDIDATE_SHA: ${{ steps.refs.outputs.candidate }}
          PROBES: ${{ steps.params.outputs.probes }}
          K: ${{ steps.params.outputs.k }}
        run: |
          set -euo pipefail
          mkdir -p baseline-cache candidate-out
          python3 - <<'PY'
          import os, subprocess, sys, threading

          errors = []
          errors_lock = threading.Lock()

          def run_eval(ref_label, out_csv, prompts_dir):
              cmd = [
                  sys.executable, "eval/ci_eval.py", "run",
                  "--ref", ref_label,
                  "--probes", os.environ["PROBES"],
                  "--k", os.environ["K"],
                  "--out", out_csv,
                  "--prompts-dir", prompts_dir,
                  "--gen-model", os.environ["GEN_MODEL"],
                  "--judge-model", os.environ["JUDGE_MODEL"],
              ]
              result = subprocess.run(cmd, text=True)
              if result.returncode != 0:
                  with errors_lock:
                      errors.append(f"eval failed for {ref_label} (exit {result.returncode})")

          threads = [
              threading.Thread(target=run_eval, args=(
                  f"{os.environ['BASELINE_SHA']}=baseline",
                  "baseline-cache/results-baseline.csv",
                  "baseline-cache/prompts",
              )),
              threading.Thread(target=run_eval, args=(
                  f"{os.environ['CANDIDATE_SHA']}=candidate",
                  "candidate-out/results-candidate.csv",
                  "candidate-out/prompts",
              )),
          ]
          for t in threads:
              t.start()
          for t in threads:
              t.join()
          if errors:
              raise SystemExit("\n".join(errors))

          # B2: assert both expected CSV paths exist after threads complete
          import pathlib
          missing = []
          for p in ("baseline-cache/results-baseline.csv", "candidate-out/results-candidate.csv"):
              if not pathlib.Path(p).exists():
                  missing.append(p)
          if missing:
              raise SystemExit(f"eval produced no output CSV(s): {missing}")
          PY
          # Signal to the cache-save step that baseline is valid
          echo "baseline_ok=true" >> "$GITHUB_OUTPUT"

      # B1: Save baseline only when it was freshly computed AND baseline_ok is true.
      # always() ensures this runs even if a candidate failure follows; the gate
      # on baseline_ok prevents saving a partial/absent baseline-cache/.
      - name: Save baseline cache
        if: always() && steps.concurrent-eval.outputs.baseline_ok == 'true' && steps.cache-baseline.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: baseline-cache/
          key: ${{ steps.cache-baseline.outputs.cache-primary-key }}

      - name: Run candidate eval (cache hit — baseline reused)
        if: steps.cache-baseline.outputs.cache-hit == 'true'
        env:
          CANDIDATE_SHA: ${{ steps.refs.outputs.candidate }}
          PROBES: ${{ steps.params.outputs.probes }}
          K: ${{ steps.params.outputs.k }}
        run: |
          set -euo pipefail
          mkdir -p candidate-out
          python3 eval/ci_eval.py run \
            --ref "${CANDIDATE_SHA}=candidate" \
            --probes "$PROBES" \
            --k "$K" \
            --out candidate-out/results-candidate.csv \
            --prompts-dir candidate-out/prompts \
            --gen-model "$GEN_MODEL" \
            --judge-model "$JUDGE_MODEL"

      # -----------------------------------------------------------------------
      # Merge CSVs — one Python expression, single responsibility.
      # -----------------------------------------------------------------------
      - name: Merge baseline + candidate CSVs
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv, pathlib, sys

          sources = [
              "baseline-cache/results-baseline.csv",
              "candidate-out/results-candidate.csv",
          ]
          rows = []
          for p in sources:
              with open(p, newline="", encoding="utf-8") as f:
                  rows.extend(list(csv.DictReader(f)))

          if not rows:
              raise SystemExit("merged CSV is empty")

          fieldnames = list(rows[0].keys())
          out = pathlib.Path("merged-results.csv")
          with open(out, "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=fieldnames, extrasaction="ignore")
              w.writeheader()
              w.writerows(rows)
          print(f"Merged {len(rows)} rows -> {out}")
          PY

      # -----------------------------------------------------------------------
      # Statistical tests — captures output AND exit code without failing the
      # step. statistical_test.py exits 1 on FIX-REQUIRED; if the step fails
      # here it kills the job before comment/enforce can run and post results.
      # "Enforce fail verdict" is the ONLY step that exits non-zero based on
      # the verdict; this step's job is only to produce stats-output.txt.
      # -----------------------------------------------------------------------
      - name: Run statistical test
        run: |
          set -euo pipefail
          # A1: rc-capture pattern — pipe through tee but capture the Python
          # exit code via PIPESTATUS (not the tee exit code).  Accept 0 (APPROVE)
          # and 1 (FIX-REQUIRED/FAIL — verdict present, job must still post comment).
          # Any other rc (crash, import error, missing file …) exits the step non-zero
          # so the job goes red instead of silently producing an empty stats file.
          set +e
          python3 eval/statistical_test.py merged-results.csv \
            --baseline baseline \
            --candidate candidate \
            | tee stats-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "statistical_test.py exited with unexpected rc=$rc (crash or missing dep)" >&2
            exit "$rc"
          fi

      # -----------------------------------------------------------------------
      # Canary leak check — separate step; own responsibility.
      # -----------------------------------------------------------------------
      - name: Check canary leaks in responses
        run: |
          set -euo pipefail
          # A2: same rc-capture pattern as stats step.  check-canary-leak.py exits
          # 0 (no leaks) or 1 (leaks detected — still want the output for the comment).
          # Any other rc is a crash and must not silently produce empty canary-output.txt.
          set +e
          python3 scripts/check-canary-leak.py merged-results.csv \
            | tee canary-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "check-canary-leak.py exited with unexpected rc=$rc (crash or missing dep)" >&2
            exit "$rc"
          fi

      # -----------------------------------------------------------------------
      # Format and post the sticky PR comment.
      # -----------------------------------------------------------------------
      - name: Format PR comment
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline }}
          CANDIDATE_SHA: ${{ steps.refs.outputs.candidate }}
        run: |
          set -euo pipefail
          # --baseline/--candidate are the CSV calibration labels used for table
          # lookup; --baseline-sha/--candidate-sha are the git SHAs shown in the
          # comment heading. Keeping them separate fixes the pre-existing bug where
          # passing SHAs as labels caused every table cell to render as "-".
          # A3: rc-capture — ci_eval.py comment exits 1 on FAIL verdict (output
          # already written to comment-body.md before exit).  Accept 0 and 1;
          # any other rc is a crash and the step must fail red.
          set +e
          python3 eval/ci_eval.py comment \
            --csv merged-results.csv \
            --baseline baseline \
            --candidate candidate \
            --baseline-sha "$BASELINE_SHA" \
            --candidate-sha "$CANDIDATE_SHA" \
            --stats-output stats-output.txt \
            --canary-output canary-output.txt \
            > comment-body.md
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "ci_eval.py comment exited with unexpected rc=$rc (crash)" >&2
            exit "$rc"
          fi

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && hashFiles('comment-body.md') != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: eval-ci-results
          path: comment-body.md

      # -----------------------------------------------------------------------
      # Enforce tiered verdict — fails the job on regression or canary leak.
      # -----------------------------------------------------------------------
      - name: Enforce fail verdict
        run: |
          set -euo pipefail
          python3 eval/ci_eval.py comment \
            --csv merged-results.csv \
            --baseline baseline \
            --candidate candidate \
            --stats-output stats-output.txt \
            --canary-output canary-output.txt \
            > /dev/null
          # ci_eval.py comment exits 1 on FAIL verdict, 0 on APPROVE/WARNING
          # --baseline-sha/--candidate-sha omitted here (heading not needed for enforcement)
