name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: bump and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pulls=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0]')
          if [ -z "$pulls" ] || [ "$pulls" = "null" ]; then
            exit 0
          fi

          labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '[.[0].labels[].name] | join(" ")')

          if echo "$labels" | grep -q "release:major"; then
            bump="major"
          elif echo "$labels" | grep -q "release:minor"; then
            bump="minor"
          else
            bump="patch"
          fi

          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)
          if [ -n "$latest" ]; then
            version=${latest#v}
            major=${version%%.*}
            rest=${version#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
          fi

          if [ -z "$latest" ]; then
            next="v0.1.0"
          elif [ "$bump" = "major" ]; then
            next="v$((major + 1)).0.0"
          elif [ "$bump" = "minor" ]; then
            next="v${major}.$((minor + 1)).0"
          else
            next="v${major}.${minor}.$((patch + 1))"
          fi

          gh release create "$next" --target "${{ github.sha }}" --title "$next" --generate-notes
